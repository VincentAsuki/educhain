<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verify Certificate - EduChain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Verify Certificate</h1>
  </header>

  <main>
    <form id="verifyForm">
      <label>Enter Certificate ID:</label>
      <input type="text" id="certId" required>
      <button type="submit">Verify</button>
    </form>

    <p id="verifyResult"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
